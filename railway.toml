[build]
builder = "RAILPACK"
buildCommand = "apt-get install -y git && pip install -r requirements.txt"

[deploy]
startCommand = "gunicorn --workers 1 --timeout 300 --bind 0.0.0.0:$PORT flask_app:app"
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
