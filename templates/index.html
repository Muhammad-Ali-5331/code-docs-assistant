<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codebase Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script
  async
  crossorigin="anonymous"
  data-clerk-publishable-key="pk_test_Ym9zcy1waXJhbmhhLTYyLmNsZXJrLmFjY291bnRzLmRldiQ"
  src="https://boss-piranha-62.clerk.accounts.dev/npm/@clerk/clerk-js@6/dist/clerk.browser.js"
  type="text/javascript"
></script>
</head>
<body>

<div class="shell">

  <!-- ===== SIDEBAR ===== -->
  <aside class="side" id="side">
    <div class="side-head">
      <div class="brand">
        <span class="brand-dot"></span>
        <span class="brand-name">CodeChat</span>
      </div>
      <button class="icon-btn only-mobile" id="closeSideBtn">✕</button>
    </div>

    <button class="new-chat-btn" id="newChatBtn">
      <span class="plus">+</span> New Project
    </button>

    <div class="side-section-label">Your Projects</div>

    <div class="project-list" id="projectList">
      <div class="project-empty" id="projectEmpty">No projects yet — start one above.</div>
    </div>

    <div class="side-foot">
      <button class="icon-btn only-mobile" id="signInBtnMobile">Sign In</button>
    </div>
  </aside>

  <div class="side-overlay" id="sideOverlay"></div>

  <!-- ===== MAIN ===== -->
  <main class="main">

    <header class="top-bar">
      <button class="icon-btn only-mobile" id="openSideBtn">☰</button>
      <div class="top-title" id="topTitle">New Project</div>
      <div class="top-actions">
        <button id="signInBtn" class="pill-btn">Sign In</button>
        <div id="userButtonSlot" class="user-slot hidden"></div>
      </div>
    </header>

    <!-- ===== NEW PROJECT PANEL (shown when no project is open) ===== -->
    <section class="new-project-panel" id="newProjectPanel">
      <div class="np-card">
        <div class="np-icon">📂</div>
        <h2>Point me at a GitHub repo</h2>
        <p>Paste a public repository URL and I'll index it so you can ask questions about the code.</p>

        <div class="np-input-row">
          <span class="np-input-icon">🔗</span>
          <input type="text" id="repoUrl" placeholder="https://github.com/user/repo">
        </div>

        <button id="cloneBtn" class="cta-btn">
          <span id="cloneBtnText">Index Repository</span>
        </button>

        <div class="np-steps" id="npSteps">
          <div class="np-step" id="step-clone"><span class="np-step-dot"></span> Cloning repository</div>
          <div class="np-step" id="step-parse"><span class="np-step-dot"></span> Reading &amp; chunking files</div>
          <div class="np-step" id="step-vector"><span class="np-step-dot"></span> Building vector index</div>
        </div>
      </div>
    </section>

    <!-- ===== CHAT VIEW (shown when a project is open) ===== -->
    <section class="chat-view hidden" id="chatView">
      <div class="chat-scroll" id="chatWindow"></div>

      <footer class="composer">
        <div class="composer-inner">
          <input type="text" id="questionInput" placeholder="Ask about your codebase...">
          <button id="stopBtn" class="round-btn stop hidden">⏹</button>
          <button id="sendBtn" class="round-btn send">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 12L20 4L14 20L11 13L4 12Z" fill="currentColor"/></svg>
          </button>
        </div>
        <div class="composer-hint">Press Enter to send</div>
      </footer>
    </section>

  </main>
</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
