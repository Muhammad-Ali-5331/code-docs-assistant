<style>
  body {
    font-family: 'Inter', sans-serif;
    background: #13131b;
    color: #e4e1ed;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    margin: 0;
  }
  #status { text-align: center; font-size: 15px; }
</style>
<link rel="shortcut icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>

<div id="status">Checking login status...</div>

<script>
  const waitForClerk = setInterval(async () => {
    if (window.Clerk) {
      clearInterval(waitForClerk);
      await window.Clerk.load();

      const statusEl = document.getElementById("status");

      if (window.Clerk.user) {
        const token = await window.Clerk.session.getToken();
        console.log("Clerk session token:", token);
        window.location.href = "/";
      } else {
        statusEl.textContent = "Redirecting to sign in...";
        window.Clerk.redirectToSignIn({ redirectUrl: window.location.href });
      }
    }
  }, 100);
</script>

</body>
</html>
